name: Build and release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      agent_tag: ${{ steps.agent.outputs.tag }}
      agent_hash: ${{ steps.agent.outputs.hash }}
      package_version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Check sources
        run: |
          set -euo pipefail
          sh -n root/etc/init.d/nezha-agent
          sh -n root/etc/uci-defaults/99-nezha-agent
          sh -n root/usr/libexec/nezha-agent-manager
          sh -n scripts/build_ipk.sh
          tests/test_arch_mapping.sh
          tests/test_manager.sh
          sh tests/test_uci_defaults.sh
          node tests/test_import_parser.js
          node --check htdocs/luci-static/resources/view/nezha-agent/config.js
          node --check htdocs/luci-static/resources/nezha-agent/import-parser.js
          jq empty root/usr/share/luci/menu.d/luci-app-nezha-agent.json
          jq empty root/usr/share/rpcd/acl.d/luci-app-nezha-agent.json

      - name: Resolve package version
        id: package
        run: |
          set -euo pipefail
          version="$(awk -F ':=' '/^PKG_VERSION:=/ { print $2; exit }' Makefile | tr -d '[:space:]')"
          test -n "$version"
          if [[ "$GITHUB_REF_TYPE" == tag && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve latest Nezha Agent
        id: agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release="$(gh api repos/nezhahq/agent/releases/latest)"
          tag="$(jq -r '.tag_name' <<< "$release")"
          test -n "$tag" && test "$tag" != null
          curl -fL --retry 3 \
            "https://github.com/nezhahq/agent/releases/download/$tag/checksums.txt" \
            -o checksums.txt
          hash="$(awk '$2 == "nezha-agent_linux_amd64.zip" { print $1; exit }' checksums.txt)"
          test -n "$hash"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: opkg
            label: 23.05-24.10
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            sdk_hash: d3e8ea62fc1c12f93a9c808c2ef4c01b6e149ee240bcd5a74d15bebcbc385bdd
            extension: ipk
          - id: apk
            label: 25.12+
            sdk_url: https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            sdk_hash: 28e004c1be4d215d19c1f12a6aa4c8d8f80689549eb707d0ff5a71f16fa8d05f
            extension: apk
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio device-tree-compiler file flex gawk \
            gcc-multilib g++-multilib gettext git gperf help2man intltool \
            libelf-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm make ninja-build patch pkgconf \
            python3 python3-docutils python3-pip python3-ply python3-pyelftools \
            rsync swig tar unzip wget xmlto xxd zlib1g-dev zstd

      - name: Download and verify SDK
        run: |
          set -euo pipefail
          sdk_url='${{ matrix.sdk_url }}'
          sdk_hash='${{ matrix.sdk_hash }}'
          curl -fL --retry 3 "$sdk_url" -o sdk.tar.zst
          echo "$sdk_hash  sdk.tar.zst" | sha256sum -c -
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare SDK feeds and package
        run: |
          set -euo pipefail
          cd sdk
          ./scripts/feeds update base packages luci
          ./scripts/feeds install -a -p base
          ./scripts/feeds install -a -p packages
          ./scripts/feeds install -a -p luci
          rsync -a --delete \
            --exclude '.git/' --exclude '.github/' --exclude 'dist/' \
            --exclude 'sdk/' --exclude 'sdk.tar.zst' --exclude 'upload/' \
            "$GITHUB_WORKSPACE/" package/luci-app-nezha-agent/

      - name: Configure and compile
        env:
          NEZHA_AGENT_TAG: ${{ needs.prepare.outputs.agent_tag }}
          NEZHA_AGENT_HASH: ${{ needs.prepare.outputs.agent_hash }}
        run: |
          set -euo pipefail
          cd sdk
          cat > .config <<'EOF'
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_PACKAGE_luci-app-nezha-agent=m
          CONFIG_LUCI_LANG_zh_Hans=y
          EOF
          make defconfig
          make package/luci-app-nezha-agent/{clean,compile} \
            -j"$(nproc)" V=s \
            NEZHA_AGENT_TAG="$NEZHA_AGENT_TAG" \
            NEZHA_AGENT_HASH="$NEZHA_AGENT_HASH"

      - name: Collect packages
        run: |
          set -euo pipefail
          mkdir -p upload
          find sdk/bin/packages -type f \
            \( -name 'luci-app-nezha-agent*.${{ matrix.extension }}' \
               -o -name 'luci-i18n-nezha-agent-zh-cn*.${{ matrix.extension }}' \) \
            -exec cp -v {} upload/ \;
          test "$(find upload -type f | wc -l)" -eq 2
          for file in upload/*; do
            name="$(basename "$file")"
            mv "$file" "upload/${{ matrix.label }}_$name"
          done

      - uses: actions/upload-artifact@v6
        with:
          name: packages-${{ matrix.id }}
          path: upload/*
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt

      - uses: actions/upload-artifact@v6
        with:
          name: luci-app-nezha-agent-${{ needs.prepare.outputs.package_version }}
          path: dist/*

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
